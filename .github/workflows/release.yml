name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version and changelog
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Collect commits since the previous release tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross-compilation toolchains
        if: steps.check.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu \
            mingw-w64

      - name: Install Rust toolchain
        if: steps.check.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            x86_64-unknown-linux-gnu,
            armv7-unknown-linux-gnueabihf,
            aarch64-unknown-linux-gnu,
            x86_64-pc-windows-gnu

      - name: Cache Cargo registry
        if: steps.check.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build x86_64 Linux
        if: steps.check.outputs.exists == 'false'
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu --package yaslp-gui
          cargo build --release --target x86_64-unknown-linux-gnu --package yaslp-web

      - name: Build ARMv7 Linux
        if: steps.check.outputs.exists == 'false'
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_SYSROOT_DIR: "/"
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: |
          cargo build --release --target armv7-unknown-linux-gnueabihf --package yaslp-gui
          cargo build --release --target armv7-unknown-linux-gnueabihf --package yaslp-web

      - name: Build AArch64 Linux
        if: steps.check.outputs.exists == 'false'
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_SYSROOT_DIR: "/"
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu --package yaslp-gui
          cargo build --release --target aarch64-unknown-linux-gnu --package yaslp-web

      - name: Build Windows x86_64
        if: steps.check.outputs.exists == 'false'
        run: |
          cargo build --release --target x86_64-pc-windows-gnu --package yaslp-gui
          cargo build --release --target x86_64-pc-windows-gnu --package yaslp-web

      - name: Collect binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/yaslp-gui      dist/yaslp-gui-linux-x86_64
          cp target/x86_64-unknown-linux-gnu/release/yaslp-web      dist/yaslp-web-linux-x86_64
          cp target/armv7-unknown-linux-gnueabihf/release/yaslp-gui dist/yaslp-gui-linux-armv7
          cp target/armv7-unknown-linux-gnueabihf/release/yaslp-web dist/yaslp-web-linux-armv7
          cp target/aarch64-unknown-linux-gnu/release/yaslp-gui     dist/yaslp-gui-linux-aarch64
          cp target/aarch64-unknown-linux-gnu/release/yaslp-web     dist/yaslp-web-linux-aarch64
          cp target/x86_64-pc-windows-gnu/release/yaslp-gui.exe    dist/yaslp-gui-windows-x86_64.exe
          cp target/x86_64-pc-windows-gnu/release/yaslp-web.exe    dist/yaslp-web-windows-x86_64.exe

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release_notes.md << 'EOF'
          ${{ steps.version.outputs.changelog }}

          ## Downloads
          | File | Platform |
          |------|----------|
          | `yaslp-gui-linux-x86_64` | Linux x86_64 (desktop GUI) |
          | `yaslp-gui-linux-armv7` | Linux ARMv7 (desktop GUI) |
          | `yaslp-gui-linux-aarch64` | Linux AArch64 (desktop GUI) |
          | `yaslp-gui-windows-x86_64.exe` | Windows x86_64 (desktop GUI) |
          | `yaslp-web-linux-x86_64` | Linux x86_64 (web server) |
          | `yaslp-web-linux-armv7` | Linux ARMv7 (web server) |
          | `yaslp-web-linux-aarch64` | Linux AArch64 (web server) |
          | `yaslp-web-windows-x86_64.exe` | Windows x86_64 (web server) |
          EOF
          gh release create "${{ steps.version.outputs.tag }}" dist/* \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.md
